name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cicd-project .

      - name: Deploy
        run: |
          docker stop cicd-app || true
          docker rm cicd-app || true
          docker run -d --name cicd-app -p 8080:80 cicd-project
